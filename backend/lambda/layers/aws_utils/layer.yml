AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Utilities Layer for Oli-Branch Lambda Functions

Parameters:
  LayerBucket:
    Type: String
    Default: oli-branch-lambda-layers

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  AWSUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub oli-branch-aws-utils-${Environment}
      Description: Comprehensive AWS service utilities for Oli-Branch
      Content:
        S3Bucket: !Ref LayerBucket
        S3Key: aws_utils.zip
      CompatibleRuntimes:
        - python3.9
        - python3.10
        - python3.11
        - python3.12
      LicenseInfo: MIT

Outputs:
  LayerVersionArn:
    Description: ARN of the AWS Utils Layer
    Value: !Ref AWSUtilsLayer
    Export:
      Name:
        Fn::Sub: "${AWS::StackName}-AWSUtilsLayerArn"
