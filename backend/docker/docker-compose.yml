# docker/docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: olibranch-postgres
    environment:
      POSTGRES_USER: olibranch
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: olibranch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olibranch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - olibranch-network

  redis:
    image: redis:7-alpine
    container_name: olibranch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - olibranch-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olibranch-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://olibranch:password123@postgres:5432/olibranch
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: development
    volumes:
      - ../:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - olibranch-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: olibranch-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - olibranch-network

  n8n:
    image: n8nio/n8n:latest
    container_name: olibranch-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin123}
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - olibranch-network

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  olibranch-network:
    driver: bridge