services:

  postgres:
    image: postgres:15
    container_name: olibranch-postgres
    environment:
      POSTGRES_USER: olibranch
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: olibranch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - olibranch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olibranch"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-n8n:
    image: postgres:15
    container_name: olibranch-postgres-n8n
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8npass123}
      POSTGRES_DB: n8n
    ports:
      - "5433:5432"
    volumes:
      - postgres_n8n_data:/var/lib/postgresql/data
    networks:
      - olibranch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: olibranch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - olibranch-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: olibranch-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://olibranch:${DB_PASSWORD:-password123}@postgres:5432/olibranch
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      N8N_WEBHOOK_URL: http://n8n:5678/
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - olibranch-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: olibranch-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_N8N_URL: http://localhost:5678
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - olibranch-network

  n8n:
    image: n8nio/n8n:latest
    container_name: olibranch-n8n
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres-n8n
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-n8npass123}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      EXECUTIONS_DATA_PRUNE: ${EXECUTIONS_DATA_PRUNE:-true}
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-168}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/New_York}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres-n8n:
        condition: service_healthy
    networks:
      - olibranch-network
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_n8n_data:
  redis_data:
  n8n_data:

networks:
  olibranch-network:
    driver: bridge